  <!-- A Z -->
  <text font-family="Poppins,Segoe UI,sans-serif" font-weight="800" font-size="44" fill="#a259ff" text-anchor="middle" dominant-baseline="central" x="126" y="122">A</text>
  <text font-family="Poppins,Segoe UI,sans-serif" font-weight="800" font-size="44" fill="#e8edf7" text-anchor="middle" dominant-baseline="central" opacity="0.9" x="174" y="162">Z</text>
