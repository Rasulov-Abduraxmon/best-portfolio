      <stop offset="0%" stop-color="#a259ff"/>
      <stop offset="100%" stop-color="#4f8ef7"/>
    </linearGradient>
  </defs>
  <rect width="300" height="300" rx="24" fill="#070d1a"/>
  <rect x="0" y="0" width="300" height="4" rx="2" fill="url(#g1)"/>
  <rect x="20" y="20" width="260" height="260" rx="20" fill="none" stroke="#a259ff" stroke-width="0.8" opacity="0.3"/>
